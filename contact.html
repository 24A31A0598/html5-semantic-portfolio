content="Contact form.">

<body>

class="skip-link">

<header>

<main id="main-content">

<h1>Contact Me</h1>

<form
aria-label="Contact Form">

<div>

<label for="name">
Full Name
</label>

<input
id="name"
name="name"
type="text"
required>

</div>

<div>

<label for="email">
Email
</label>

<input
id="email"
name="email"
type="email"
autocomplete="email"
required>

</div>

<div>

<label for="message">
Message
</label>

<textarea
id="message"
name="message"
rows="6"
required>
</textarea>

</div>

<button type="submit">
Send Message
</button>

</form>

</main>

<footer>

<p>© 2026</p>

</footer>

</body>
</html>
